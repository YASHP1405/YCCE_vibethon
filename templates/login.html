<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SkillSwap</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash-msg flash-{{ category }}" onclick="this.remove()">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-container">
        <div class="auth-box fade-in">
            <div class="auth-header">
                <a href="{{ url_for('index') }}" class="nav-brand" style="justify-content:center; margin-bottom:var(--space-lg);">
                    <span class="nav-brand-icon">🔄</span>
                    SkillSwap
                </a>
                <h1>Welcome Back</h1>
                <p>Log in to your skill marketplace</p>
            </div>
            
            <form method="POST" action="{{ url_for('login') }}" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="yash@college.edu" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Log In →</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
            </div>
        </div>
    </div>
</body>
</html>
